<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products — GTC Studio</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: #FFFFF0;
  color: #111;
}

h1 {
  font-family: 'EB Garamond', serif;
  text-align: center;
  margin: 60px 0 20px;
  font-size: 3rem;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 40px;
}

.product {
  background: #fff;
  border: 1px solid rgba(0,0,0,0.05);
  padding: 20px;
  text-align: center;
  transition: transform 0.3s;
}

.product:hover {
  transform: translateY(-5px);
}

.product img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.product h3 {
  font-family: 'EB Garamond', serif;
  margin: 15px 0 10px;
}

.product p {
  font-size: 0.9rem;
  color: #555;
}
</style>
</head>

<body>

<h1>Our Products</h1>

<div class="products">
  <div class="product">
    <img src="images/product1.jpg">
    <h3>Luxury Perfume</h3>
    <p>High-end fragrance collection available in-store.</p>
  </div>
  <div class="product">
    <img src="images/product2.jpg">
    <h3>Clarins Skincare</h3>
    <p>Premium skincare products for all skin types.</p>
  </div>
  <div class="product">
    <img src="images/product3.jpg">
    <h3>Custom Photo Frames</h3>
    <p>Personalized frames crafted with precision.</p>
  </div>
</div>

</body>
</html>
